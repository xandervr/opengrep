rules:
  - id: taint_interfile_smoke_dockerfile
    mode: taint
    languages: [dockerfile]
    options:
      interfile: true
    pattern-sources:
      - pattern: RUN sink(source())
    pattern-sinks:
      - pattern: RUN sink(...)
    message: Taint should run with interfile enabled for Dockerfile
    severity: ERROR

  - id: taint_interfile_smoke_html
    mode: taint
    languages: [html]
    options:
      interfile: true
    pattern-sources:
      - pattern: <source />
    pattern-sinks:
      - pattern: <sink>...</sink>
    message: Taint should run with interfile enabled for HTML
    severity: ERROR

  - id: taint_interfile_smoke_json
    mode: taint
    languages: [json]
    options:
      interfile: true
    pattern-sources:
      - pattern: |
          "source"
    pattern-sinks:
      - pattern: |
          {"sink": ...}
    message: Taint should run with interfile enabled for JSON
    severity: ERROR

  - id: taint_interfile_smoke_jsonnet
    mode: taint
    languages: [jsonnet]
    options:
      interfile: true
    pattern-sources:
      - pattern: source()
    pattern-sinks:
      - pattern: sink(...)
    message: Taint should run with interfile enabled for Jsonnet
    severity: ERROR

