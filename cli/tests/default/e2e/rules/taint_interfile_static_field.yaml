rules:
  - id: taint_interfile_static_field_java
    message: Taint should flow through Java static fields
    languages: [java]
    severity: WARNING
    mode: taint
    options: { interfile: true }
    pattern-sources:
      - pattern: source(...)
    pattern-sinks:
      - pattern: sink(...)

