rules:
  - id: taint_interfile_inherited_constructor_java
    message: Taint should flow through inherited Java constructors
    languages:
      - java
    severity: WARNING
    mode: taint
    options:
      interfile: true
    pattern-sources:
      - pattern: source(...)
    pattern-sinks:
      - pattern: sink(...)
  - id: taint_interfile_inherited_constructor_js
