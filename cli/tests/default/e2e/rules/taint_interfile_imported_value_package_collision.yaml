rules:
  - id: taint_interfile_imported_value_package_collision_python
    message: Imported Python module values should stay package-qualified
    languages:
      - python
    severity: WARNING
    mode: taint
    options:
      interfile: true
    pattern-sources:
      - pattern: source(...)
    pattern-sinks:
      - pattern: sink(...)
  - id: taint_interfile_imported_value_package_collision_js
    message: Imported JavaScript module values should stay path-qualified
    languages:
      - js
    severity: WARNING
    mode: taint
    options:
      interfile: true
    pattern-sources:
      - pattern: source(...)
    pattern-sinks:
      - pattern: sink(...)
