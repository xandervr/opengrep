rules:
  - id: taint_interfile_matrix_apex
    message: Taint should flow across Apex files
    languages: [apex]
    severity: WARNING
    mode: taint
    options: { interfile: true }
    pattern-sources:
      - pattern: source(...)
    pattern-sinks:
      - pattern: sink(...)

  - id: taint_interfile_matrix_bash
    message: Taint should flow across Bash files
